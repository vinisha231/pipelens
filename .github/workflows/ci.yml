# ============================================================
# CI workflow for pipelens itself.
#
# Runs on every push and pull request to main.
# Jobs:
#   - lint: TypeScript type checking
#   - test: Run vitest unit tests
#   - build: Compile TypeScript to dist/
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions — read-only for CI
permissions:
  contents: read

jobs:
  lint:
    name: Type Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # Pinned to full SHA for supply chain security
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Verify CLI entry point exists
        run: test -f dist/cli/index.js && echo "CLI entry point built successfully"

      # Upload dist for potential release usage
      - uses: actions/upload-artifact@65c4c4a1ddee5b6b2b37b9e26d62d4e5fa69db9f  # v4.6.0
        with:
          name: dist
          path: dist/
          retention-days: 3
